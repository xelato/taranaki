name: Wasm

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Validate .wit files
      run: |
        time cargo install cargo-binstall
        cargo install wasm-tools
        wasm-tools component wit wit/
