name: Taranaki

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install
      run: |
        python -m pip install uv > /dev/null

    - name: Validate
      run: |
        cargo --version
        cargo fmt --check
        uvx ruff check

    - name: Version
      if: github.event_name != 'release'
      run: |
        python tools/update-version.py v99.99.99
        cat VERSION
        uv version `cat VERSION`

    - name: Release Version
      if: github.event_name == 'release' && github.event.action == 'published'
      run: |
        python tools/update-version.py "${{ github.event.release.tag_name }}"
        cat VERSION
        uv version `cat VERSION`

    - name: Build Wheel
      run: |
        uv build
        ls -l dist/
        uv run taranaki version

    - name: Build
      run: |
        cargo build --release
        ls -l target/release/*.so
        sha256sum target/release/*.so
        file target/release/*.so

    - name: Build Docker
      run: |
        cp target/release/libtaranaki_python.so docker/
        docker build --tag taranaki:latest docker/

    - name: Test Docker
      run: |
        docker run --rm -d \
            --name taranaki \
            -p 127.0.0.1:6379:6379 \
            taranaki:latest

        uv run --with pytest pytest
        docker rm -f taranaki

    - name: Test Redis
      run: |
        docker run --rm -d \
            --name redis \
            -p 127.0.0.1:6379:6379 \
            --volume $PWD:/app \
            redis:7.2.13 \
            redis-server \
            --loadmodule "/app/target/release/libtaranaki_python.so"

        uv run --with pytest pytest
        docker rm -f redis

    - name: Test Valkey
      run: |
        docker run --rm -d \
            --name valkey \
            -p 127.0.0.1:6379:6379 \
            --volume $PWD:/app \
            valkey/valkey:9.0.3 \
            valkey-server \
            --loadmodule "/app/target/release/libtaranaki_python.so"

        uv run --with pytest pytest
        docker rm -f valkey

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts/{lib,python,docker}
        cp VERSION artifacts/
        echo "${{ github.sha }}" > artifacts/COMMIT-SHA
        cp target/release/*.so artifacts/lib/
        cp dist/* artifacts/python/

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: artifacts
        path: artifacts/
        retention-days: 1


  release-assets:

    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: write

    steps:

    - name: Download artifacts
      uses: actions/download-artifact@v7
      with:
        name: artifacts
        path: artifacts/

    - name: Upload release assets
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: |
          artifacts/VERSION
          artifacts/COMMIT-SHA
          artifacts/python/*.whl
          artifacts/lib/*.so
