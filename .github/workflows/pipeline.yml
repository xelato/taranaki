name: Taranaki

# TODO:
# immutable releases:
# - create draft
# - attach assets
# - publish draft
# version.sha
# test with redict
# alpine
# ppc64le

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:

  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: astral-sh/setup-uv@v8.1.0
    - run: |
        cargo --version
        cargo fmt --check
        uvx ruff check


  version:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      release: ${{ steps.set-metadata.outputs.release }}
      version: ${{ steps.set-metadata.outputs.version }}
    steps:
    - id: set-metadata
      shell: bash
      run: |
        release="v0.0.0"
        if [[ "${{ github.event_name }}" == "release" ]]; then 
          release="${{ github.event.release.tag_name }}"
        fi
        version=`python -c 'import sys; v=sys.argv[1]; v=v[1:] if v.startswith("v") else v; print(v)' $release`

        # validate release version
        python -m pip install uv > /dev/null
        uv init
        uv version "$release"

        # outputs
        echo "release=$release" >> $GITHUB_OUTPUT
        echo "version=$version" >> $GITHUB_OUTPUT


  build-python:
    runs-on: ubuntu-latest
    needs: version
    steps:
    - uses: actions/checkout@v5
    - uses: astral-sh/setup-uv@v8.1.0

    - name: Build Wheel
      run: |
        uv version "$RELEASE"
        uv build
        uv run taranaki version
      env:
        RELEASE: ${{needs.version.outputs.release}}

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: python
        path: dist/
        retention-days: 1


  build:
    runs-on: ubuntu-latest
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            target: aarch64-unknown-linux-gnu
    steps:
    - uses: actions/checkout@v5

    - name: Install target
      shell: bash
      run: |
        rustup target add ${{ matrix.target }}
        if [[ ${{ matrix.arch }} == "arm64" ]]; then
          sudo apt install -y gcc-aarch64-linux-gnu
        fi

    - name: Build
      shell: bash
      run: |
        python tools/update-version.py "$RELEASE"
        if [[ ${{ matrix.target }} == "aarch64-unknown-linux-gnu" ]]; then
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
        fi
        cargo build --release --locked --target ${{ matrix.target }}
        file target/${{ matrix.target }}/release/*.so
        sha256sum target/${{ matrix.target }}/release/*.so
      env:
        RELEASE: ${{needs.version.outputs.release}}

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: release-${{ matrix.arch }}
        path: target/${{ matrix.target }}/release/*.so
        retention-days: 1


  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
    steps:
    - uses: actions/checkout@v5
    - uses: astral-sh/setup-uv@v8.1.0

    - name: Download artifacts
      uses: actions/download-artifact@v7
      with:
        name: release-${{ matrix.arch }}
        path: target/release/

    - name: Fix permissions
      run: |
        chmod 555 target/release/*.so

    - name: Test Valkey
      run: |
        docker run --rm -d \
            --platform "linux/${{ matrix.arch }}" \
            --name valkey \
            -p 127.0.0.1:6379:6379 \
            --volume $PWD:/app \
            valkey/valkey:9.0.3 \
            valkey-server \
            --loadmodule "/app/target/release/libtaranaki.so"
        ./tools/wait-for 127.0.0.1:6379 -t 5
        uv run --with pytest pytest
        docker rm -f valkey

    - name: Test Redis
      run: |
        docker run --rm -d \
            --platform "linux/${{ matrix.arch }}" \
            --name redis \
            -p 127.0.0.1:6379:6379 \
            --volume $PWD:/app \
            redis:7.2.13 \
            redis-server \
            --loadmodule "/app/target/release/libtaranaki.so"
        ./tools/wait-for 127.0.0.1:6379 -t 5
        uv run --with pytest pytest
        docker rm -f redis


  docker:
    runs-on: ubuntu-latest
    needs: [test, version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: arm64
    steps:
    - uses: actions/checkout@v5
    - uses: astral-sh/setup-uv@v8.1.0

    - name: Download artifacts
      uses: actions/download-artifact@v7
      with:
        name: release-${{ matrix.arch }}
        path: docker/linux/${{ matrix.arch }}/

    - uses: docker/setup-qemu-action@v3
      if: matrix.arch == 'arm64'
      with:
        platforms: arm64

    - name: Build Docker
      run: |
        chmod 555 docker/linux/${{ matrix.arch }}/*.so
        export DOCKER_DEFAULT_PLATFORM=linux/${{ matrix.arch }}
        docker build \
          --platform linux/${{ matrix.arch }} \
          --tag xelato/taranaki:$version-${{ matrix.arch }} docker/
        docker image save -o release-${{ matrix.arch }}.docker xelato/taranaki:$version-${{ matrix.arch }}
      env:
        version: ${{needs.version.outputs.version}}

    - name: Test Docker
      if: matrix.arch == 'amd64'
      run: |
        docker run --rm -d -p 127.0.0.1:6379:6379 xelato/taranaki:$version-${{ matrix.arch }}
        ./tools/wait-for 127.0.0.1:6379 -t 5
        uv run --with pytest pytest
      env:
        version: ${{needs.version.outputs.version}}

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: release-${{ matrix.arch }}.docker
        path: release-${{ matrix.arch }}.docker
        retention-days: 1


  release-assets:
    runs-on: ubuntu-latest
    needs: [docker, build-python]
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: write

    steps:
    - run: |
        mkdir artifacts/
        echo ${{ github.event.release.tag_name }} >> artifacts/VERSION

    - uses: actions/download-artifact@v7
      with:
        name: python
        path: artifacts/python/

    - uses: actions/download-artifact@v7
      with:
        name: release-amd64
        path: artifacts/lib/amd64/

    - uses: actions/download-artifact@v7
      with:
        name: release-arm64
        path: artifacts/lib/arm64/

    - uses: actions/download-artifact@v7
      with:
        name: release-amd64.docker
        path: artifacts/docker/amd64/

    - uses: actions/download-artifact@v7
      with:
        name: release-arm64.docker
        path: artifacts/docker/arm64/

    - run: |
        mv artifacts/lib/amd64/libtaranaki.so artifacts/lib/taranaki.${{ github.event.release.tag_name }}.amd64.so
        mv artifacts/lib/arm64/libtaranaki.so artifacts/lib/taranaki.${{ github.event.release.tag_name }}.arm64.so

    - name: Upload release assets
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event.release.tag_name }}
        fail_on_unmatched_files: true
        files: |
          artifacts/VERSION
          artifacts/python/*.whl
          artifacts/lib/*.so
          artifacts/docker/*/*.docker


  release-docker:
    runs-on: ubuntu-latest
    needs: [docker, version, release-assets]
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: read
    environment:
      name: docker
    steps:
    - uses: actions/checkout@v5

    - uses: actions/download-artifact@v7
      with:
        name: release-amd64
        path: docker/linux/amd64/

    - uses: actions/download-artifact@v7
      with:
        name: release-arm64
        path: docker/linux/arm64/

    - uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64,amd64

    - uses: docker/setup-buildx-action@v4

    - uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - run: |
        chmod 555 docker/linux/amd64/*.so
        chmod 555 docker/linux/arm64/*.so
        docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag xelato/taranaki:$version \
            --tag xelato/taranaki:latest \
            --push \
            docker/
      env:
        version: ${{needs.version.outputs.version}}


  release-pypi:
    runs-on: ubuntu-latest
    needs: release-assets
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      # mandatory for trusted publishing
      id-token: write
      contents: read
    environment:
      name: pypi
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v7
      with:
        name: python
        path: dist/

    #- name: Publish to PyPI
    #  uses: pypa/gh-action-pypi-publish@release/v1
    #  with:
    #    packages-dir: dist/
    #    print-hash: true
